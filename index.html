<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Documentos del Vehículo</title>

    <meta name="description"
          content="Documentación digital del vehículo. Permiso de circulación, SOAP, revisión técnica y padrón.">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Favicon -->
    <link rel="icon"
          type="image/png"
          href="imagenes/favicon.png">

    <!-- Estilos -->
    <link rel="stylesheet"
            href="style.css?v=2">

</head>

<body>

<div class="contenedor">

    <!-- ====================================== -->
    <!-- CABECERA PREMIUM -->
    <!-- ====================================== -->

    <header class="hero">

        <div class="hero-icono">

            <i class="bi bi-car-front-fill"></i>

        </div>

        <div class="hero-modelo">

            KIA K3 CROSS

        </div>

        <div class="hero-patente">

            VFSV34-K

        </div>

        <div class="hero-subtitulo">

            Documentación Digital del Vehículo

        </div>

    </header>

    <!-- ====================================== -->
    <!-- DASHBOARD -->
    <!-- ====================================== -->

    <div id="panelResumen"
         class="panel-resumen">

        <div class="grid-resumen-horizontal">

            <div class="card-resumen total">

                <div class="icono">
                    <i class="bi bi-files"></i>
                </div>

                <div class="numero"
                     id="totalDocs">
                    0
                </div>

                <div class="texto">
                    Total
                </div>

            </div>

            <div class="card-resumen ok">

                <div class="icono">
                    <i class="bi bi-check-circle-fill"></i>
                </div>

                <div class="numero"
                     id="vigentesDocs">
                    0
                </div>

                <div class="texto">
                    Vigentes
                </div>

            </div>

            <div class="card-resumen aviso">

                <div class="icono">
                    <i class="bi bi-clock-history"></i>
                </div>

                <div class="numero"
                     id="proximosDocs">
                    0
                </div>

                <div class="texto">
                    Próximos
                </div>

            </div>

            <div class="card-resumen alerta">

                <div class="icono">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>

                <div class="numero"
                     id="vencidosDocs">
                    0
                </div>

                <div class="texto">
                    Vencidos
                </div>

            </div>

        </div>

    </div>

    <!-- FOTO -->

    <img src="imagenes/Auto.jpeg"
         class="foto"
         alt="Fotografía del vehículo">

    <!-- FICHA -->

    <div class="tarjeta info-vehiculo">

        <h2>

            <i class="bi bi-car-front-fill"></i>

            Kia K3 Cross

        </h2>

        <div class="ficha-grid">

            <div class="dato">
                <i class="bi bi-upc-scan"></i>
                <div>
                    <span>Patente</span>
                    <strong>VFSV34-K</strong>
                </div>
            </div>

            <div class="dato">
                <i class="bi bi-car-front"></i>
                <div>
                    <span>Tipo</span>
                    <strong>Station Wagon</strong>
                </div>
            </div>

            <div class="dato">
                <i class="bi bi-calendar-event"></i>
                <div>
                    <span>Año</span>
                    <strong>2025</strong>
                </div>
            </div>

            <div class="dato">
                <i class="bi bi-building"></i>
                <div>
                    <span>Marca</span>
                    <strong>KIA</strong>
                </div>
            </div>

            <div class="dato">
                <i class="bi bi-badge-tm"></i>
                <div>
                    <span>Modelo</span>
                    <strong>K3 Cross EX MPI 1.6</strong>
                </div>
            </div>

            <div class="dato">
                <i class="bi bi-palette-fill"></i>
                <div>
                    <span>Color</span>
                    <strong>Blanco Invierno</strong>
                </div>
            </div>

            <div class="dato">
                <i class="bi bi-fuel-pump-fill"></i>
                <div>
                    <span>Combustible</span>
                    <strong>Gasolina</strong>
                </div>
            </div>

        </div>

    </div>

    <!-- DOCUMENTOS -->

    <div id="lista-documentos"></div>

    <!-- FOOTER -->

    <footer>

        <hr>

        <p>

            <i class="bi bi-clock-history"></i>

            Última actualización

        </p>

        <strong id="ultimaActualizacion">

            02 de julio de 2026

        </strong>

    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
